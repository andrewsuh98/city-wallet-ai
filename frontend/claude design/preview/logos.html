<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:30px; background:var(--cw-paper-50); display:flex; gap:30px; align-items:center; flex-wrap:wrap; }
  .panel { background:#fff; padding:20px; border-radius:12px; box-shadow:var(--shadow-2); border:1px solid var(--border-1); }
  .dark { background:var(--cw-paper-900); }
  img { display:block; max-width:240px; height:auto; }
  .mark img { width:64px; }
</style></head>
<body>
  <div class="panel mark"><img src="../assets/logo-mark.svg"/></div>
  <div class="panel"><img src="../assets/logo-horizontal.svg"/></div>
  <div class="panel dark"><img src="../assets/logo-horizontal-dark.svg"/></div>
</body></html>
