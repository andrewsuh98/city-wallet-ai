<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:24px; background:var(--bg-card); }
  .row { display:flex; gap:8px; }
  .sw { flex:1; aspect-ratio: 1.2/1; border-radius: 8px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; color:#fff; font-family:var(--font-body); font-size:10px; line-height:1.2; border:1px solid var(--border-1); }
  .sw .hex { opacity:.85; font-family:var(--font-mono); font-size:9px; }
  .label { font-family:var(--font-body); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-3); margin-bottom:10px; font-weight:600; }
  .anchor { box-shadow: 0 0 0 2px var(--cw-paper-900); }
</style></head>
<body>
  <div class="label">Brand · Sparkassen-Rot HKS 13</div>
  <div class="row">
    <div class="sw" style="background:var(--cw-red-50); color:var(--cw-paper-900);">50<br/><span class="hex">#fff1f2</span></div>
    <div class="sw" style="background:var(--cw-red-100); color:var(--cw-paper-900);">100<br/><span class="hex">#ffd9dd</span></div>
    <div class="sw" style="background:var(--cw-red-200); color:var(--cw-paper-900);">200<br/><span class="hex">#ffb3bb</span></div>
    <div class="sw" style="background:var(--cw-red-300); color:var(--cw-paper-900);">300<br/><span class="hex">#ff8590</span></div>
    <div class="sw" style="background:var(--cw-red-400);">400<br/><span class="hex">#f54d5c</span></div>
    <div class="sw anchor" style="background:var(--cw-red-500);">500<br/><span class="hex">#e30018</span></div>
    <div class="sw" style="background:var(--cw-red-600);">600<br/><span class="hex">#c20014</span></div>
    <div class="sw" style="background:var(--cw-red-700);">700<br/><span class="hex">#9c0010</span></div>
    <div class="sw" style="background:var(--cw-red-800);">800<br/><span class="hex">#6e000b</span></div>
    <div class="sw" style="background:var(--cw-red-900);">900<br/><span class="hex">#3d0006</span></div>
  </div>
</body></html>
