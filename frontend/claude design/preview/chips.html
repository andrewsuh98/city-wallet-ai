<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css"/>
<style>
  body { margin:0; padding:24px; background:var(--bg-card); }
  .label { font-family:var(--font-body); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-3); margin-bottom:14px; font-weight:600; }
  .row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
  .chip { display:inline-flex; align-items:center; gap:6px; padding:5px 11px; border-radius:999px; font-family:var(--font-body); font-size:11px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; }
  .chip i { font-size:13px; }
</style></head>
<body>
  <div class="label">Context chips</div>
  <div class="row">
    <span class="chip" style="background:var(--cw-cool-bg); color:var(--cw-cool);"><i class="ph ph-cloud-rain"></i>Rain · 11°C</span>
    <span class="chip" style="background:var(--cw-warm-bg); color:#a16207;"><i class="ph ph-sun"></i>Sunny · 18°C</span>
    <span class="chip" style="background:var(--cw-fresh-bg); color:var(--cw-fresh);"><i class="ph ph-coffee"></i>Brewed 4 min ago</span>
    <span class="chip" style="background:var(--cw-dusk-bg); color:var(--cw-dusk);"><i class="ph ph-music-notes"></i>Concert nearby</span>
    <span class="chip" style="background:var(--cw-paper-100); color:var(--fg-2);"><i class="ph ph-map-pin"></i>80m away</span>
    <span class="chip" style="background:var(--cw-paper-100); color:var(--fg-2);"><i class="ph ph-clock"></i>Until 13:00</span>
    <span class="chip" style="background:var(--cw-red-500); color:#fff;">−20%</span>
    <span class="chip" style="background:var(--cw-paper-900); color:#faf7f2;">New</span>
  </div>
</body></html>
