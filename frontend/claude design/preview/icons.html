<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css"/>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/bold/style.css"/>
<style>
  body { margin:0; padding:24px; background:var(--bg-card); }
  .label { font-family:var(--font-body); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-3); margin-bottom:14px; font-weight:600; }
  .grid { display:grid; grid-template-columns: repeat(8, 1fr); gap:14px; }
  .ic { display:flex; flex-direction:column; align-items:center; gap:6px; color:var(--fg-1); }
  .ic i { font-size:24px; }
  .ic span { font-family:var(--font-mono); font-size:9px; color:var(--fg-3); }
  .cap { font-family:var(--font-body); font-size:11px; color:var(--fg-3); margin-top:14px; }
</style></head>
<body>
  <div class="label">Iconography · Phosphor Regular</div>
  <div class="grid">
    <div class="ic"><i class="ph ph-cloud-rain"></i><span>cloud-rain</span></div>
    <div class="ic"><i class="ph ph-sun"></i><span>sun</span></div>
    <div class="ic"><i class="ph ph-snowflake"></i><span>snowflake</span></div>
    <div class="ic"><i class="ph ph-coffee"></i><span>coffee</span></div>
    <div class="ic"><i class="ph ph-map-pin"></i><span>map-pin</span></div>
    <div class="ic"><i class="ph ph-clock"></i><span>clock</span></div>
    <div class="ic"><i class="ph ph-wallet"></i><span>wallet</span></div>
    <div class="ic"><i class="ph ph-storefront"></i><span>storefront</span></div>
    <div class="ic"><i class="ph ph-qr-code"></i><span>qr-code</span></div>
    <div class="ic"><i class="ph ph-arrow-right"></i><span>arrow-right</span></div>
    <div class="ic"><i class="ph ph-bell"></i><span>bell</span></div>
    <div class="ic"><i class="ph ph-shield-check"></i><span>shield-check</span></div>
    <div class="ic"><i class="ph ph-music-notes"></i><span>music-notes</span></div>
    <div class="ic"><i class="ph ph-fork-knife"></i><span>fork-knife</span></div>
    <div class="ic"><i class="ph ph-tag"></i><span>tag</span></div>
    <div class="ic"><i class="ph ph-receipt"></i><span>receipt</span></div>
  </div>
  <div class="cap">Substitution flag — confirm with DSV before production</div>
</body></html>
