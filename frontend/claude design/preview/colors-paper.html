<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:24px; background:var(--bg-card); }
  .row { display:flex; gap:8px; }
  .sw { flex:1; aspect-ratio: 1.2/1; border-radius: 8px; display:flex; flex-direction:column; justify-content:flex-end; padding:8px; font-family:var(--font-body); font-size:10px; line-height:1.2; border:1px solid var(--border-1); }
  .sw .hex { opacity:.7; font-family:var(--font-mono); font-size:9px; }
  .label { font-family:var(--font-body); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-3); margin-bottom:10px; font-weight:600; }
</style></head>
<body>
  <div class="label">Paper neutrals · warm receipt → ink</div>
  <div class="row">
    <div class="sw" style="background:var(--cw-paper-0); color:var(--cw-paper-900);">0<br/><span class="hex">#ffffff</span></div>
    <div class="sw" style="background:var(--cw-paper-50); color:var(--cw-paper-900);">50<br/><span class="hex">#faf7f2</span></div>
    <div class="sw" style="background:var(--cw-paper-100); color:var(--cw-paper-900);">100<br/><span class="hex">#f3eee5</span></div>
    <div class="sw" style="background:var(--cw-paper-200); color:var(--cw-paper-900);">200<br/><span class="hex">#e8e0d2</span></div>
    <div class="sw" style="background:var(--cw-paper-300); color:var(--cw-paper-900);">300<br/><span class="hex">#d6cab5</span></div>
    <div class="sw" style="background:var(--cw-paper-400); color:#fff;">400<br/><span class="hex">#a89d87</span></div>
    <div class="sw" style="background:var(--cw-paper-500); color:#fff;">500<br/><span class="hex">#7a715f</span></div>
    <div class="sw" style="background:var(--cw-paper-600); color:#fff;">600<br/><span class="hex">#5a5346</span></div>
    <div class="sw" style="background:var(--cw-paper-700); color:#fff;">700<br/><span class="hex">#3d3830</span></div>
    <div class="sw" style="background:var(--cw-paper-800); color:#fff;">800<br/><span class="hex">#26221c</span></div>
    <div class="sw" style="background:var(--cw-paper-900); color:#fff;">900<br/><span class="hex">#15130f</span></div>
  </div>
</body></html>
