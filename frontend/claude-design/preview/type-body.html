<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:24px; background:var(--bg-card); }
  .label { font-family:var(--font-body); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-3); margin-bottom:14px; font-weight:600; }
  .row { display:flex; align-items:baseline; gap:16px; margin-bottom:12px; }
  .meta { font-family:var(--font-mono); font-size:10px; color:var(--fg-3); width:120px; flex:none; }
  .specimen { color:var(--fg-1); }
</style></head>
<body>
  <div class="label">Body · Inter Tight, all UI</div>
  <div class="row"><div class="meta">H3 / 17 / 600</div><div class="specimen"><h3>Show to cashier</h3></div></div>
  <div class="row"><div class="meta">Body / 15 / 400</div><div class="specimen"><p>80m away · brewed 4 minutes ago · −20% until 13:00</p></div></div>
  <div class="row"><div class="meta">Small / 13 / 400</div><div class="specimen small">Used your location for 4s. It didn't leave the phone.</div></div>
  <div class="row"><div class="meta">Eyebrow / 11 / 600</div><div class="specimen eyebrow">NEAR YOU · 11:42</div></div>
  <div class="row"><div class="meta">Mono / 13</div><div class="specimen mono">CW-7842-K9PQ</div></div>
</body></html>
