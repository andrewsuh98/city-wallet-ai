<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:24px; background:var(--bg-card); }
  .label { font-family:var(--font-body); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-3); margin-bottom:14px; font-weight:600; }
  .pair { display:grid; grid-template-columns: 1fr 1fr; gap:24px; }
  .col { padding:16px; border-radius:12px; border:1px solid var(--border-1); background:var(--cw-paper-50); }
  .col h4 { margin:0 0 10px; font-family:var(--font-body); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-3); font-weight:600; }
  .head { font-family:var(--font-display); font-size:22px; line-height:1.05; letter-spacing:-0.02em; color:var(--fg-1); font-weight:500; margin-bottom:8px; }
  .data { font-family:var(--font-body); font-size:13px; color:var(--fg-3); }
</style></head>
<body>
  <div class="label">Voice pairing · serif feeling, sans data</div>
  <div class="pair">
    <div class="col">
      <h4>Situational</h4>
      <div class="head">Rain stopped. Pastries half off.</div>
      <div class="data">Café Müller · 80m · until 14:00</div>
    </div>
    <div class="col">
      <h4>Functional</h4>
      <div class="head" style="font-family:var(--font-body);font-weight:600;font-size:18px;">Wallet</div>
      <div class="data">3 active offers · 2 expiring today</div>
    </div>
  </div>
</body></html>
