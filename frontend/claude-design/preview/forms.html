<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css"/>
<style>
  body { margin:0; padding:24px; background:var(--bg-card); }
  .label { font-family:var(--font-body); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-3); margin-bottom:14px; font-weight:600; }
  .field { margin-bottom:14px; }
  .lbl { font-family:var(--font-body); font-size:12px; font-weight:600; color:var(--fg-2); margin-bottom:6px; display:block; }
  .input { width:100%; padding:11px 12px; border-radius:6px; border:1px solid var(--border-2); background:#fff; font-family:var(--font-body); font-size:14px; color:var(--fg-1); box-sizing:border-box; }
  .input:focus { outline: 2px solid var(--cw-red-500); outline-offset: 2px; border-color:var(--cw-red-500); }
  .input.error { border-color:var(--status-danger); }
  .help { font-family:var(--font-body); font-size:11px; color:var(--fg-3); margin-top:4px; }
  .err { font-family:var(--font-body); font-size:11px; color:var(--status-danger); margin-top:4px; }
  .grp { display:flex; gap:8px; align-items:center; padding:10px; border-radius:6px; background:var(--cw-paper-50); border:1px solid var(--border-1); }
  .grp i { color:var(--fg-3); }
  .grp input { flex:1; border:none; outline:none; background:transparent; font-family:var(--font-body); font-size:14px; }
</style></head>
<body>
  <div class="label">Form fields</div>
  <div class="field">
    <label class="lbl">Postcode</label>
    <input class="input" value="70173"/>
    <div class="help">We use this to find merchants near you.</div>
  </div>
  <div class="field">
    <label class="lbl">Email</label>
    <input class="input error" value="mia@"/>
    <div class="err">That doesn't look like a complete email.</div>
  </div>
  <div class="field">
    <label class="lbl">Search</label>
    <div class="grp"><i class="ph ph-magnifying-glass"></i><input placeholder="A merchant or street"/></div>
  </div>
</body></html>
