<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:24px; background:var(--bg-card); }
  .label { font-family:var(--font-body); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-3); margin-bottom:14px; font-weight:600; }
  .grid { display:grid; grid-template-columns: repeat(6,1fr); gap:14px; align-items:end; }
  .item { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .box { width:60px; height:60px; background:var(--cw-paper-100); border:1px solid var(--border-2); }
  .name { font-family:var(--font-mono); font-size:10px; color:var(--fg-3); }
  .use { font-family:var(--font-body); font-size:11px; color:var(--fg-2); text-align:center; }
</style></head>
<body>
  <div class="label">Radii · ticket vocabulary</div>
  <div class="grid">
    <div class="item"><div class="box" style="border-radius:4px"></div><span class="name">4</span><span class="use">inputs</span></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><span class="name">8</span><span class="use">rows / btns</span></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><span class="name">12</span><span class="use">cards</span></div>
    <div class="item"><div class="box" style="border-radius:18px"></div><span class="name">18</span><span class="use">offer card</span></div>
    <div class="item"><div class="box" style="border-radius:24px"></div><span class="name">24</span><span class="use">sheets</span></div>
    <div class="item"><div class="box" style="border-radius:999px"></div><span class="name">pill</span><span class="use">chips</span></div>
  </div>
</body></html>
