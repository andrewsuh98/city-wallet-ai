<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:24px; background:var(--bg-card); }
  .label { font-family:var(--font-body); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-3); margin-bottom:14px; font-weight:600; }
  .row { display:flex; align-items:baseline; gap:16px; margin-bottom:14px; padding-bottom:14px; border-bottom:1px solid var(--border-1); }
  .row:last-child { border-bottom:none; padding-bottom:0; }
  .meta { font-family:var(--font-mono); font-size:10px; color:var(--fg-3); width:120px; flex:none; }
  .specimen { color:var(--fg-1); }
</style></head>
<body>
  <div class="label">Display · Fraunces, situational hero</div>
  <div class="row"><div class="meta">Hero / 44 / 500</div><div class="specimen hero">Cold outside?</div></div>
  <div class="row"><div class="meta">Display / 32 / 500</div><div class="specimen display">Your cappuccino is waiting.</div></div>
  <div class="row"><div class="meta">H1 / 24 / 500</div><div class="specimen"><h1>Near you, right now</h1></div></div>
  <div class="row"><div class="meta">H2 / 20 / 500</div><div class="specimen"><h2>Quiet hours at Café Müller</h2></div></div>
</body></html>
