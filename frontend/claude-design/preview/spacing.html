<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:24px; background:var(--bg-card); }
  .label { font-family:var(--font-body); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-3); margin-bottom:14px; font-weight:600; }
  .row { display:flex; align-items:center; gap:12px; margin-bottom:8px; }
  .bar { background:var(--cw-red-500); height:14px; border-radius:2px; }
  .name { font-family:var(--font-mono); font-size:11px; color:var(--fg-2); width:120px; flex:none; }
  .px { font-family:var(--font-body); font-size:11px; color:var(--fg-3); }
</style></head>
<body>
  <div class="label">Spacing · 4-pt grid</div>
  <div class="row"><span class="name">--space-1</span><div class="bar" style="width:2px"></div><span class="px">2px</span></div>
  <div class="row"><span class="name">--space-2</span><div class="bar" style="width:4px"></div><span class="px">4px</span></div>
  <div class="row"><span class="name">--space-3</span><div class="bar" style="width:8px"></div><span class="px">8px</span></div>
  <div class="row"><span class="name">--space-4</span><div class="bar" style="width:12px"></div><span class="px">12px</span></div>
  <div class="row"><span class="name">--space-5</span><div class="bar" style="width:16px"></div><span class="px">16px</span></div>
  <div class="row"><span class="name">--space-6</span><div class="bar" style="width:20px"></div><span class="px">20px · gutter</span></div>
  <div class="row"><span class="name">--space-7</span><div class="bar" style="width:24px"></div><span class="px">24px</span></div>
  <div class="row"><span class="name">--space-8</span><div class="bar" style="width:32px"></div><span class="px">32px</span></div>
  <div class="row"><span class="name">--space-9</span><div class="bar" style="width:40px"></div><span class="px">40px</span></div>
  <div class="row"><span class="name">--space-10</span><div class="bar" style="width:56px"></div><span class="px">56px</span></div>
</body></html>
