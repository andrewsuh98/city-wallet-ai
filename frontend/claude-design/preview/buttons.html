<!doctype html>
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<link rel="stylesheet" href="https://unpkg.com/@phosphor-icons/web@2.1.1/src/regular/style.css"/>
<style>
  body { margin:0; padding:24px; background:var(--bg-card); }
  .label { font-family:var(--font-body); font-size:11px; letter-spacing:.08em; text-transform:uppercase; color:var(--fg-3); margin-bottom:14px; font-weight:600; }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .btn { font-family:var(--font-body); font-size:14px; font-weight:600; padding:10px 18px; border-radius:8px; border:1px solid transparent; cursor:pointer; display:inline-flex; align-items:center; gap:8px; }
  .primary { background:var(--cw-red-500); color:#fff; }
  .secondary { background:var(--cw-paper-900); color:#fff; }
  .ghost { background:transparent; color:var(--fg-1); border-color:var(--border-2); }
  .quiet { background:transparent; color:var(--fg-1); }
  .small { padding:6px 12px; font-size:13px; }
  .lg { padding:14px 22px; font-size:16px; }
  .disabled { opacity:.4; }
  .cap { font-family:var(--font-body); font-size:11px; color:var(--fg-3); margin-top:14px; }
</style></head>
<body>
  <div class="label">Buttons</div>
  <div class="row">
    <button class="btn primary lg">Accept offer <i class="ph ph-arrow-right"></i></button>
    <button class="btn primary">Show to cashier</button>
    <button class="btn secondary">Open wallet</button>
    <button class="btn ghost">Maybe later</button>
    <button class="btn quiet">Dismiss</button>
    <button class="btn primary disabled">Sold out</button>
  </div>
  <div class="cap">Sizes: lg 14·22 / md 10·18 / sm 6·12 · radius 8 · weight 600 · sentence case always</div>
</body></html>
